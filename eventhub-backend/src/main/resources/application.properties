# ===============================
# SERVER CONFIG
# ===============================
server.port=${PORT:5000}
# Matches your Vercel/Vite /api bridge
server.servlet.context-path=/api

# ===============================
# DATABASE CONFIG
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-wandering-leaf-a1ml8tap-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD:npg_XQYJlj8oEyA1}

# Removed driver-class-name to resolve "not assignable" error

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Keep connections alive by pinging the database
spring.datasource.hikari.keepalive-time=30000

# Retire connections before Neon's 5-minute aggressive idle timeout (set to 4 minutes)
spring.datasource.hikari.max-lifetime=240000

# Don't let connections sit idle for more than 2 minutes
spring.datasource.hikari.idle-timeout=120000

# How long to wait for a connection before throwing an error
spring.datasource.hikari.connection-timeout=20000

# ===============================
# JPA CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Let Spring Boot auto-detect the dialect to avoid HHH90000025 warnings
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Fixes PageImpl serialization issues (empty JSON objects)
spring.data.web.pageable.serialization-mode=via-dto

