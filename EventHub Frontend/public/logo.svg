<svg width="200" height="200" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="chromaticAberration" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset in="SourceAlpha" dx="-0.8" dy="0" result="offsetL_alpha" />
      <feOffset in="SourceAlpha" dx="0.8" dy="0" result="offsetR_alpha" />
      
      <feFlood flood-color="#00ffff" flood-opacity="0.8" result="flood_cyan" />
      <feFlood flood-color="#ff7f00" flood-opacity="0.8" result="flood_orange" />
      
      <feComposite in="flood_cyan" in2="offsetL_alpha" operator="in" result="colored_L" />
      <feComposite in="flood_orange" in2="offsetR_alpha" operator="in" result="colored_R" />
      
      <feGaussianBlur in="colored_L" stdDeviation="0.5" result="colored_L_blurred" />
      <feGaussianBlur in="colored_R" stdDeviation="0.5" result="colored_R_blurred" />
      
      <feMerge>
        <feMergeNode in="colored_L_blurred" />
        <feMergeNode in="colored_R_blurred" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="100" height="100" fill="#2d3748" />

  <rect x="15" y="15" width="70" height="70" rx="12" fill="#facc15" />

  <g transform="translate(50, 50)" filter="url(#chromaticAberration)">
    <text 
      font-family="'Georgia', 'Times New Roman', Times, serif" 
      font-size="60" 
      font-weight="normal"
      text-anchor="middle" 
      dominant-baseline="central" 
      fill="#000033"
      x="0" 
      y="1"
    >
      E
    </text>
  </g>
</svg>